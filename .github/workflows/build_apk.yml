name: Build Flutter APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Recreate Android Project & Get Pub
        run: |
          cd mobile
          rm -rf android
          flutter create --platforms=android --org com.bukukas .
          flutter pub get

      - name: Build APK
        run: |
          cd mobile
          flutter build apk --release --no-tree-shake-icons

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: bukukas-app-release
          path: mobile/build/app/outputs/flutter-apk/app-release.apk