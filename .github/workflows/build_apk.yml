name: Build Flutter APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Ambil kode dari repository
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2. Set up Java
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      # 3. Set up Flutter
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      # 4. Generate folder android jika belum ada & install dependencies
      - name: Repair Flutter & Install Dependencies
        run: |
          cd mobile
          flutter create . --platforms=android
          flutter pub get

      # 5. Build file APK Release
      - name: Build APK
        run: |
          cd mobile
          flutter build apk --release

      # 6. Simpan hasil APK agar bisa diunduh
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: bukukas-app-release
          path: mobile/build/app/outputs/flutter-apk/app-release.apk